<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GardenTool Pro</title>
    <style>
        /* =========================================
           VARIABILI CSS E IMPOSTAZIONI BASE
           ========================================= */
        :root {
            --primary-dark: #2f7d32;
            --primary-light: #4caf50;
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-dark: #333333;
            --text-light: #666666;
            --success: #4caf50;
            --warning: #ffb300;
            --danger: #e53935;
            --border-radius: 12px;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* =========================================
           HEADER E LAYOUT
           ========================================= */
        header {
            background-color: var(--primary-dark);
            color: white;
            padding: 1.5rem;
            text-align: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* =========================================
           BOTTONI E INPUT
           ========================================= */
        button {
            background-color: var(--primary-light);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        button.outline {
            background-color: transparent;
            color: var(--primary-dark);
            border: 2px solid var(--primary-dark);
        }

        button.outline:hover {
            background-color: var(--primary-dark);
            color: white;
        }
        
        button.small {
            padding: 0.4rem 0.8rem;
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }

        /* =========================================
           DASHBOARD & CARDS
           ========================================= */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .actions-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }

        .card-header {
            border-bottom: 1px solid #eee;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1.3rem;
            color: var(--primary-dark);
            margin-bottom: 0.3rem;
        }

        .card-subtitle {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .card-stats {
            margin-bottom: 1.5rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        /* =========================================
           VISTA DETTAGLIO STRUMENTO
           ========================================= */
        #tool-detail-view {
            display: none;
        }

        .detail-header {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            text-align: center;
        }

        .hours-display {
            font-size: 3rem;
            color: var(--primary-dark);
            font-weight: bold;
            margin: 1rem 0;
        }

        .custom-hours-form {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            max-width: 300px;
            margin: 0 auto;
        }

        .custom-hours-form input {
            margin-bottom: 0;
            text-align: center;
        }

        .grid-2-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .grid-2-col {
                grid-template-columns: 1fr;
            }
            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        .panel {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .panel h3 {
            color: var(--primary-dark);
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 0.5rem;
        }

        /* =========================================
           SISTEMA MANUTENZIONE (BARRE E DETTAGLI)
           ========================================= */
        .maintenance-item {
            margin-bottom: 1.5rem;
            background-color: #fafafa;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .maintenance-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            font-weight: bold;
        }

        .progress-bar-bg {
            background-color: #e0e0e0;
            border-radius: 10px;
            height: 12px;
            width: 100%;
            overflow: hidden;
            position: relative;
            margin-bottom: 0.5rem;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease, background-color 0.5s ease;
        }

        .maintenance-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }

        .alert-msg {
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* Dettagli espandibili */
        details {
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px dashed #ccc;
        }

        summary {
            font-size: 0.85rem;
            color: var(--primary-dark);
            cursor: pointer;
            font-weight: 600;
            outline: none;
            user-select: none;
        }

        .maintenance-info {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-top: 0.5rem;
            line-height: 1.4;
        }

        /* =========================================
           CALCOLATORE MISCELA E MODALI
           ========================================= */
        .mix-result {
            background-color: var(--bg-color);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            margin-top: 1rem;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .mix-result span {
            color: var(--primary-dark);
            font-size: 1.5rem;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; visibility: hidden;
            transition: var(--transition); backdrop-filter: blur(3px);
        }

        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-content {
            background: var(--card-bg); padding: 2rem;
            border-radius: var(--border-radius); width: 90%; max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transform: translateY(-20px); transition: var(--transition);
        }

        .modal-overlay.active .modal-content { transform: translateY(0); }

        .modal-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 1.5rem;
        }

        .close-btn {
            background: none; border: none; font-size: 1.5rem;
            color: var(--text-light); cursor: pointer; padding: 0;
        }
        .close-btn:hover { color: var(--danger); background: none; transform: none; box-shadow: none; }
    </style>
</head>
<body>

    <header>
        <h1>🌿 Gestione Decespugliatori</h1>
    </header>

    <div class="container">
        
        <main id="dashboard-view">
            <div class="dashboard-header">
                <h2>I tuoi strumenti</h2>
                <div class="actions-bar">
                    <button class="outline small" onclick="exportData()">💾 Salva Backup</button>
                    <button class="outline small" onclick="document.getElementById('file-input').click()">📂 Carica Dati</button>
                    <input type="file" id="file-input" style="display: none;" accept=".json" onchange="importData(event)">
                    
                    <button onclick="openModal()">➕ Nuovo</button>
                </div>
            </div>
            
            <div id="tools-container" class="tools-grid">
                </div>
        </main>

        <main id="tool-detail-view">
            <button class="outline" onclick="closeToolDetail()" style="margin-bottom: 1rem;">
                ⬅ Torna alla Dashboard
            </button>

            <div class="detail-header">
                <h2 id="detail-title">Marca Modello</h2>
                <p class="card-subtitle" id="detail-subtitle">Tipo | Miscela: %</p>
                
                <div class="hours-display">
                    <span id="detail-hours">0</span> <span style="font-size: 1rem; color: var(--text-light);">ore totali</span>
                </div>
                
                <div class="custom-hours-form">
                    <input type="number" id="custom-hours-input" min="0.1" step="0.1" placeholder="Ore (es. 1.5)">
                    <button onclick="addCustomHours()">Aggiungi</button>
                </div>
            </div>

            <div class="grid-2-col">
                <div class="panel">
                    <h3>🛠 Stato Manutenzione</h3>
                    <div id="maintenance-container">
                        </div>
                </div>

                <div class="panel">
                    <h3>⛽ Calcolatore Miscela</h3>
                    <p style="margin-bottom: 1rem; color: var(--text-light); font-size: 0.9rem;">
                        Inserisci i litri di benzina, calcoleremo l'olio necessario in base alla percentuale salvata (<span id="calc-mix-perc"></span>%).
                    </p>
                    
                    <label>Litri di benzina:</label>
                    <input type="number" id="petrol-liters" placeholder="Es. 5" step="0.5" min="0.5" oninput="calculateMix()">
                    
                    <div class="mix-result">
                        Olio da aggiungere:<br>
                        <span id="oil-result">0</span> ml
                    </div>
                </div>
            </div>
        </main>

    </div>

    <div id="add-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nuovo Strumento</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <form id="add-tool-form" onsubmit="addTool(event)">
                <label>Marca:</label>
                <input type="text" id="tool-brand" required placeholder="Es. Stihl, Husqvarna...">
                
                <label>Modello:</label>
                <input type="text" id="tool-model" required placeholder="Es. FS 450">
                
                <label>Tipo Motore:</label>
                <select id="tool-type">
                    <option value="2 tempi">2 tempi</option>
                    <option value="4 tempi">4 tempi</option>
                </select>
                
                <label>Percentuale Miscela Consigliata (%):</label>
                <input type="number" id="tool-mix" required step="0.1" min="0" placeholder="Es. 2">
                
                <button type="submit" style="width: 100%; margin-top: 1rem;">💾 Salva Strumento</button>
            </form>
        </div>
    </div>

    <script>
        // =========================================
        // STATO E REGOLE
        // =========================================
        
        let tools = [];
        let currentToolId = null;

        // Regole dettagliate di manutenzione
        const maintenanceRules = {
            filter: { 
                name: "Pulizia filtro aria", 
                interval: 10,
                info: "Rimuovi il coperchio del filtro. Se è in spugna, lavalo con acqua calda e sapone, strizzalo e lascialo asciugare. Se è in carta, soffialo delicatamente con aria compressa dall'interno verso l'esterno. Un filtro intasato aumenta i consumi e usura il motore."
            },
            spark: { 
                name: "Controllo candela", 
                interval: 25,
                info: "Smonta la candela usando l'apposita chiave. Pulisci gli elettrodi con una spazzola metallica per rimuovere i depositi carboniosi. Controlla che la distanza tra gli elettrodi sia corretta (circa 0.5 mm). Se gli elettrodi sono consumati, sostituisci la candela."
            },
            gear: { 
                name: "Ingrassaggio coppia conica", 
                interval: 30,
                info: "Pulisci la zona attorno al tappo della testina ingranaggi prima di svitarlo. Inserisci grasso specifico per coppie coniche (al litio/molibdeno) girando leggermente il disco per far distribuire il grasso sui denti. Non riempire fino all'orlo per evitare sovrappressioni."
            },
            carb: { 
                name: "Pulizia carburatore e pescante", 
                interval: 50,
                info: "Controlla il filtro pescante all'interno del serbatoio della miscela (sostituiscilo se duro o sporco). Per il carburatore, è consigliata una pulizia delle membrane o l'uso di uno spray pulitore specifico se noti cali di potenza o spegnimenti al minimo."
            }
        };

        // Caricamento iniziale
        window.onload = () => {
            const savedTools = localStorage.getItem('brushcutters_data');
            if (savedTools) tools = JSON.parse(savedTools);
            renderTools();
        };

        function saveData() {
            localStorage.setItem('brushcutters_data', JSON.stringify(tools));
        }

        // =========================================
        // BACKUP E RIPRISTINO DATI (EXPORT / IMPORT)
        // =========================================

        function exportData() {
            if (tools.length === 0) {
                alert("Nessun dato da salvare!");
                return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(tools));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "backup_decespugliatori.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedTools = JSON.parse(e.target.result);
                    if (Array.isArray(importedTools)) {
                        tools = importedTools;
                        saveData();
                        renderTools();
                        alert("Dati ripristinati con successo!");
                    } else {
                        alert("Il file non contiene dati validi per questa app.");
                    }
                } catch (err) {
                    alert("Errore nella lettura del file. Assicurati che sia il file .json corretto.");
                }
            };
            reader.readAsText(file);
            // Reset input per permettere di ricaricare lo stesso file
            event.target.value = ''; 
        }

        // =========================================
        // GESTIONE UI
        // =========================================

        function openModal() { document.getElementById('add-modal').classList.add('active'); }
        function closeModal() { 
            document.getElementById('add-modal').classList.remove('active'); 
            document.getElementById('add-tool-form').reset(); 
        }

        function openToolDetail(id) {
            currentToolId = id;
            const tool = tools.find(t => t.id === id);
            if(!tool) return;

            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('tool-detail-view').style.display = 'block';

            document.getElementById('detail-title').textContent = `${tool.brand} ${tool.model}`;
            document.getElementById('detail-subtitle').textContent = `Motore: ${tool.type} | Miscela: ${tool.mix}%`;
            
            // Format hours per evitare troppi decimali
            document.getElementById('detail-hours').textContent = Number.isInteger(tool.hours) ? tool.hours : tool.hours.toFixed(1);
            document.getElementById('calc-mix-perc').textContent = tool.mix;
            
            document.getElementById('custom-hours-input').value = '';
            document.getElementById('petrol-liters').value = '';
            document.getElementById('oil-result').textContent = '0';

            checkMaintenance(tool);
        }

        function closeToolDetail() {
            currentToolId = null;
            document.getElementById('tool-detail-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
            renderTools();
        }

        // =========================================
        // LOGICA STRUMENTI E ORE
        // =========================================

        function addTool(event) {
            event.preventDefault();
            const newTool = {
                id: Date.now(),
                brand: document.getElementById('tool-brand').value,
                model: document.getElementById('tool-model').value,
                type: document.getElementById('tool-type').value,
                mix: parseFloat(document.getElementById('tool-mix').value),
                hours: 0,
                maintenanceHistory: { filter: 0, spark: 0, gear: 0, carb: 0 }
            };
            tools.push(newTool);
            saveData();
            renderTools();
            closeModal();
        }

        function renderTools() {
            const container = document.getElementById('tools-container');
            container.innerHTML = '';

            if (tools.length === 0) {
                container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-light); padding: 2rem;">Nessun decespugliatore registrato. Aggiungine uno!</p>`;
                return;
            }

            tools.forEach(tool => {
                let generalStatus = "🟢 Ok";
                let statusColor = "var(--success)";
                
                for (const key in maintenanceRules) {
                    const rule = maintenanceRules[key];
                    const hoursSinceLast = tool.hours - tool.maintenanceHistory[key];
                    const percentage = (hoursSinceLast / rule.interval) * 100;
                    
                    if (percentage >= 100) { generalStatus = "🔴 Manutenzione richiesta"; statusColor = "var(--danger)"; break; } 
                    else if (percentage >= 80) { generalStatus = "🟡 Presto da fare"; statusColor = "var(--warning)"; }
                }

                // Format hours for display
                const displayHours = Number.isInteger(tool.hours) ? tool.hours : tool.hours.toFixed(1);

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div>
                        <div class="card-header">
                            <h3 class="card-title">${tool.brand}</h3>
                            <p class="card-subtitle">${tool.model}</p>
                        </div>
                        <div class="card-stats">
                            <div class="stat-row"><span>Ore Utilizzo:</span><span>${displayHours} h</span></div>
                            <div class="stat-row"><span>Stato:</span><span style="color: ${statusColor}; font-weight: bold;">${generalStatus}</span></div>
                        </div>
                    </div>
                    <button class="outline" onclick="openToolDetail(${tool.id})">Apri Dashboard ➔</button>
                `;
                container.appendChild(card);
            });
        }

        function addCustomHours() {
            const input = document.getElementById('custom-hours-input');
            const amount = parseFloat(input.value);
            
            if (isNaN(amount) || amount <= 0) {
                alert("Inserisci un numero valido di ore (es. 1.5).");
                return;
            }

            const tool = tools.find(t => t.id === currentToolId);
            if (!tool) return;

            tool.hours += amount;
            // Arrotonda per evitare problemi di virgola mobile in JS (es 1.1 + 0.2 = 1.300000001)
            tool.hours = Math.round(tool.hours * 10) / 10; 
            
            saveData();
            
            document.getElementById('detail-hours').textContent = Number.isInteger(tool.hours) ? tool.hours : tool.hours.toFixed(1);
            checkMaintenance(tool);
            input.value = ''; // svuota campo
        }

        // =========================================
        // MANUTENZIONE & CALCOLATORE
        // =========================================

        function checkMaintenance(tool) {
            const container = document.getElementById('maintenance-container');
            container.innerHTML = '';

            for (const key in maintenanceRules) {
                const rule = maintenanceRules[key];
                const hoursSinceLast = tool.hours - tool.maintenanceHistory[key];
                let percentage = (hoursSinceLast / rule.interval) * 100;
                if (percentage > 100) percentage = 100;

                let color = "var(--success)";
                let msg = "Regolare";
                let btnHtml = "";

                if (percentage >= 100) {
                    color = "var(--danger)"; msg = "Da fare subito!";
                    btnHtml = `<button class="small" style="background-color: var(--danger);" onclick="markMaintenanceDone('${key}')">✅ Fatto</button>`;
                } else if (percentage >= 80) {
                    color = "var(--warning)"; msg = "Consigliata a breve";
                    btnHtml = `<button class="small outline" onclick="markMaintenanceDone('${key}')">✅ Fatto</button>`;
                } else {
                    btnHtml = `<button class="small outline" style="opacity: 0.5;" onclick="markMaintenanceDone('${key}')">🔄 Azzera</button>`;
                }

                // Format numbers to avoid excessive decimals
                const displayCurrent = Number.isInteger(hoursSinceLast) ? hoursSinceLast : hoursSinceLast.toFixed(1);

                const item = document.createElement('div');
                item.className = 'maintenance-item';
                item.innerHTML = `
                    <div class="maintenance-header">
                        <span>${rule.name}</span>
                        <span>${displayCurrent} / ${rule.interval}h</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${percentage}%; background-color: ${color};"></div>
                    </div>
                    <div class="maintenance-status-bar">
                        <span class="alert-msg" style="color: ${color};">${msg}</span>
                        ${btnHtml}
                    </div>
                    <details>
                        <summary>Maggiori info e istruzioni...</summary>
                        <div class="maintenance-info">${rule.info}</div>
                    </details>
                `;
                container.appendChild(item);
            }
        }

        function markMaintenanceDone(taskKey) {
            const tool = tools.find(t => t.id === currentToolId);
            if (!tool) return;

            tool.maintenanceHistory[taskKey] = tool.hours;
            saveData();
            checkMaintenance(tool);
        }

        function calculateMix() {
            const tool = tools.find(t => t.id === currentToolId);
            if (!tool) return;

            const litersInput = document.getElementById('petrol-liters').value;
            const resultElement = document.getElementById('oil-result');

            if (litersInput && litersInput > 0) {
                const oilMl = parseFloat(litersInput) * tool.mix * 10;
                resultElement.textContent = Math.round(oilMl);
            } else {
                resultElement.textContent = '0';
            }
        }
    </script>
</body>
</html>
